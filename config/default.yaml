# Image response injection mode ("respond" or "catalog_only")
image_response_mode: "catalog_only"
injection_response_triggers:
  image_message:
    cooldown_s: 4.0
    max_per_minute: 6
    priority: 0
  text_message:
    cooldown_s: 2.0
    max_per_minute: 12
    priority: 0

# Interaction state cues
interaction_states:
  cues_enabled: true
  gesture_enabled: true
  earcon_enabled: false
  min_state_duration_ms: 150
  cue_delays_ms:
    idle: 0
    listening: 0
    thinking: 150
    speaking: 0

# Health monitoring
health:
  debounce_s: 2.0
  network:
    enabled: false
    host: "api.openai.com"
    timeout_s: 2.0

# Research subsystem (OpenAI-backed research available when enabled)
research:
  enabled: true
  provider: "openai"
  packet_schema: "research_packet_v1"
  permission_required: false
  permission_awaiting_decision_timeout_s: 60.0
  research_mode: "ask_on_assistant_or_unknown"  # auto | ask | disabled | ask_on_assistant_or_unknown
  tool_call_dedupe_ttl_s: 30
  spoken_response_dedupe_ttl_s: 60
  debug_response_create_trace: false
  openai:
    enabled: true
    model: "gpt-4.1-mini"
    timeout_s: 30
    max_output_chars: 2400
    max_facts: 8
    max_sources: 6
  firecrawl:
    enabled: false
    pdf_ingestion_enabled: false
    timeout_s: 15
    max_pages: 1
    max_markdown_chars: 20000
    cache_dir: "./var/research_cache"
    cache_ttl_hours: 24
    allowlist_mode: "public"  # off | public | explicit
    allowlist_domains:
      - "files.waveshare.com"
  budget:
    daily_limit: 50
  cache:
    dir: "./var/research_cache"
    ttl_hours: 24
  escalation:
    enabled: false
    max_rounds: 1
