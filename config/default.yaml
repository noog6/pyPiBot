# Default configuration for Theo

# Application directories
log_dir: "./log/"
var_dir: "./var/"

# Assistant settings
assistant_name: "Theo"
startup_prompts:
  - "Say Hello World! or whatever fun salutation you prefer"
active_user_id: "default"
stop_words:
  - "stop"
  - "cancel"
  - "abort"
stop_word_cooldown_s: 30

# Memory behavior and scope semantics
memory:
  # user_global: available across runs for the active user
  # session_local: isolated to the current runtime session_id
  default_scope: "user_global"
  auto_memory_enabled: false
  require_confirmation_for_auto_memory: false
  auto_memory_min_confidence: 0.75
  auto_pin_min_importance: 5
  auto_pin_requires_review: true
  auto_reflection_semantic_dedupe:
    enabled: false
    recent_approved_limit: 24
    high_risk_cosine: 0.90
    on_high_risk: "skip_write"
    downgrade_importance_to: 2
    downgrade_clear_pin: true
    downgrade_mark_needs_review: true
    apply_to_manual_tool: false
  retention:
    # Retention is applied by source and importance tier.
    importance_tiers:
      low: [1, 2]
      medium: [3, 4]
      high: [5]
    max_age_days_by_source:
      manual_tool:
        low: 365
      auto_reflection:
        low: 60
        medium: 180
    # Keep strategic reviewed memories and pinned memories unless pruning is forced.
    protect_review_approved_strategic: true
    # Minimum rows deleted before VACUUM/optimize is triggered.
    optimize_min_deleted_rows: 200
    # Background retention cadence in ops loop (seconds).
    maintenance_enabled: true
    maintenance_interval_s: 21600
    # Allow optimize checks only every N maintenance runs.
    maintenance_optimize_every_runs: 4

# Two-tier hydration: tiny startup digest + per-turn retrieval
memory_hydration:
  startup_digest_enabled: true
  startup_digest_max_items: 2
  startup_digest_max_chars: 280

# Turn-time memory retrieval and context injection
memory_retrieval:
  enabled: true
  scope: "user_global"
  max_memories: 3
  max_chars: 450
  cooldown_s: 10.0
  min_user_chars: 12
  min_user_tokens: 3

# Semantic memory retrieval and embedding sidecar behavior
memory_semantic:
  enabled: true
  provider: "openai"
  rerank_enabled: true
  max_candidates_for_semantic: 64
  min_similarity: 0.25
  rerank_influence_min_cosine: 0.25
  dedupe_strong_match_cosine: null
  background_embedding_enabled: true
  # When true, writes synchronously attempt embeddings if background worker is disabled.
  # This can increase CPU and turn latency on constrained hardware.
  inline_embedding_on_write_when_background_disabled: false
  rolling_backfill_batch_size: 4
  rolling_backfill_interval_idle_cycles: 15
  max_embedding_retries: 8
  write_timeout_ms: 75
  query_timeout_ms: 2000
  # Startup probe timeout for the embedding canary; this validates provider/network
  # path readiness and should tolerate cold-start jitter independent of write latency.
  startup_canary_timeout_ms: 1500
  # Test/offline bypass for canary gating (can also be overridden by PYPIBOT_SEMANTIC_CANARY_BYPASS).
  startup_canary_bypass: false
  max_writes_per_minute: 120
  max_queries_per_minute: 240
  openai:
    enabled: true
    model: "text-embedding-3-small"
    timeout_s: 10.0

# Logging settings
logging_level: "INFO"
file_logging_enabled: true
logging:
  user_transcripts:
    enabled: false
    partials:
      enabled: false
      min_chars_delta: 8
    redact:
      enabled: true
save_camera_images: false
camera_warmup_frames: 5
camera_warmup_ms: 1000

# Realtime audio detection
prefix_padding_ms: 500
silence_threshold: 0.2
silence_duration_ms: 900
realtime:
  debug_vad: false
  vad_profile: "short_confirmations"
  minimum_non_confirmation_duration_ms: 120
  confirmation_awaiting_decision_timeout_s: 60.0
  confirmation_late_decision_grace_s: 15.0
  confirmation_unclear_max_reprompts: 1
  confirmation_reminder_interval_s: 6.0
  confirmation_reminder_max_count: 2
  awaiting_confirmation_allowed_sources:
    - "battery:critical"
    - "imu:critical"
  vad_profiles:
    default:
      threshold: 0.20
      prefix_padding_ms: 500
      silence_duration_ms: 900
    short_confirmations:
      threshold: 0.16
      prefix_padding_ms: 700
      silence_duration_ms: 900

# Realtime websocket shutdown behavior
websocket_close_timeout_s: 5.0

# Audio devices
audio:
  input:
    device_name: "default"
  output:
    device_name: "softvol"

# Injected response throttling
injection_response_cooldown_s: 2.0
max_injection_responses_per_minute: 12

# Battery monitoring and response behavior
battery:
  voltage_min: 7.0
  voltage_max: 8.4
  warning_percent: 50
  critical_percent: 25
  hysteresis_percent: 0
  response:
    enabled: true
    cooldown_s: 60
    allow_warning: true
    allow_critical: true
    require_transition: false

# Operational budgets and micro-presence
ops:
  budgets:
    ai_calls_per_minute: 60
    micro_presence_per_hour: 12
    sensor_reads_per_minute: 60
    logs_per_minute: 240
  micro_presence:
    enabled: true
    min_interval_s: 45
    max_interval_s: 120
    battery_min_percent: 0.25
    health_allowed: ["ok", "degraded"]
# Alert policy
alerts:
  cooldown_s: 60
  ttl_s: 120
# Reflection settings
reflection_enabled: false
reflection_min_interval_s: 300
# Governance settings
governance:
  autonomy_level: "act-with-bounds"
  risk_threshold: 0.6
  guarded_thresholds:
    max_cost_score: 0.8
    min_rate_limit_remaining: 2
    privacy_flag_requires_confirmation: true
  budgets:
    tool_calls_per_minute: 30
    expensive_calls_per_day: 20
  autonomy_windows:
    - name: "daytime-elevated"
      start_time: "09:00"
      duration_minutes: 120
      allowed_tiers: [2]
    - name: "nightly-maintenance"
      start_time: "23:00"
      duration_minutes: 60
      allowed_tiers: [2, 3]
  # tool_specs entries must define:
  #   tier: 0 (read-only), 1 (low-risk reversible), 2 (stateful/irreversible), 3 (credentialed/irreversible)
  #   reversible: true/false
  #   cost_hint: cheap | med | expensive
  #   safety_tags: list of risk tags
  #   confirm_required: explicit confirmation gate for the tool
  #   confirm_reason: short policy reason surfaced in approval flow
  #   confirm_prompt: optional custom confirmation wording
  #   cooldown_seconds: per-tool cooldown gate before execution
  #   dry_run_supported: allows no-op simulation output
  #   governance_tier: SAFE | GUARDED | PRIVILEGED
  #   side_effects: normalized impact label for audits
  #   sensitivity: LOW | MEDIUM | HIGH
  #   default_confirmation: NEVER | ASK | ALWAYS
  tool_specs:
    read_battery_voltage:
      tier: 0
      reversible: true
      cost_hint: "cheap"
      safety_tags: ["battery", "sensor"]
      confirm_required: false
      confirm_reason: "read-only sensor query"
      confirm_prompt: null
      cooldown_seconds: 0
      dry_run_supported: true
      governance_tier: "SAFE"
      side_effects: "NONE"
      sensitivity: "LOW"
      default_confirmation: "NEVER"
    read_environment:
      tier: 0
      reversible: true
      cost_hint: "cheap"
      safety_tags: ["sensor"]
      confirm_required: false
      confirm_reason: "read-only sensor query"
      confirm_prompt: null
      cooldown_seconds: 0
      dry_run_supported: true
      governance_tier: "SAFE"
      side_effects: "NONE"
      sensitivity: "LOW"
      default_confirmation: "NEVER"
    read_imu_data:
      tier: 0
      reversible: true
      cost_hint: "cheap"
      safety_tags: ["sensor", "motion"]
      confirm_required: false
      confirm_reason: "read-only sensor query"
      confirm_prompt: null
      cooldown_seconds: 0
      dry_run_supported: true
      governance_tier: "SAFE"
      side_effects: "NONE"
      sensitivity: "LOW"
      default_confirmation: "NEVER"
    gesture_idle:
      tier: 1
      reversible: true
      cost_hint: "cheap"
      safety_tags: ["motion"]
      confirm_required: false
      confirm_reason: "low-risk reversible motion"
      confirm_prompt: null
      cooldown_seconds: 0
      dry_run_supported: true
      governance_tier: "GUARDED"
      side_effects: "REVERSIBLE_MOTION"
      sensitivity: "LOW"
      default_confirmation: "ASK"
    gesture_nod:
